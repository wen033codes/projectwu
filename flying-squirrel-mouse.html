<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小飛鼠藍牙穿戴式滑鼠 - DIY智能家居改造及電腦、手機、平板操作輔具</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        /* Image Modal Styles */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.8);
        }
        .modal-content {
            margin: auto;
            display: block;
            max-width: 90%;
            max-height: 90%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            object-fit: contain;
        }
        .modal-close {
            position: absolute;
            top: 15px;
            right: 35px;
            color: #f1f1f1;
            font-size: 40px;
            font-weight: bold;
            transition: 0.3s;
            cursor: pointer;
            z-index: 1001;
        }
        .modal-close:hover,
        .modal-close:focus {
            color: #bbb;
            text-decoration: none;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <header class="top-bar">
        <div class="container">
            <span><a href="index.html" style="color: white; text-decoration: none;">DIY智能家居改造及電腦、手機、平板操作輔具 micro:bit
                    應用</a></span>
        </div>
    </header>

    <main class="content-container">
        <h1 class="main-title big-blue-title">小飛鼠藍牙穿戴式滑鼠</h1>

        <section class="content-section">
            <h2 class="section-subtitle">說明影片</h2>

            <div class="video-responsive-wrapper">
                <!-- Video 1 -->
                <iframe width="640" height="360" src="https://www.youtube.com/embed/NH21a10v2Hc" title="小飛鼠使用說明基本操作"
                    frameborder="0"
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                    allowfullscreen></iframe>
            </div>

            <div class="video-responsive-wrapper">
                <!-- Video 2 -->
                <iframe width="640" height="360" src="https://www.youtube.com/embed/eZ7N3H10ZIs" title="小飛鼠使用說明聲控"
                    frameborder="0"
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                    allowfullscreen></iframe>
            </div>

            <div class="video-responsive-wrapper">
                <!-- Video 3 -->
                <iframe width="640" height="360" src="https://www.youtube.com/embed/mUYUKnzNU5A" title="小飛鼠使用說明觸碰"
                    frameborder="0"
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                    allowfullscreen></iframe>
            </div>

            <div class="info-links">
                <p class="info-text-label">說明文件 : <a href="docs/小飛鼠藍牙穿戴式滑鼠-使用情境及說明.pdf" class="text-link"
                        target="_blank">小飛鼠藍牙穿戴式滑鼠-使用情境及說明.pdf</a></p>
            </div>

            <!-- Code Download Section -->
            <div class="code-download-box">
                <p class="box-header"><span class="icon">📄</span> Microbit程式下載網址</p>
                <div class="code-row">
                    <div class="code-block-green" id="code-url">
                        https://github.com/wen033codes/BT-Wearable-Mouse.git
                    </div>
                    <button class="copy-btn" onclick="copyCode()">複製</button>
                </div>
                <!-- <p class="copy-instruction"><span class="icon">📋</span> 複製方法：三次點擊上方代碼區域選取全部，然後 Ctrl+C</p> -->

                <script>
                    function copyCode() {
                        var copyText = document.getElementById("code-url");
                        var textArea = document.createElement("textarea");
                        textArea.value = copyText.textContent.trim();
                        document.body.appendChild(textArea);
                        textArea.select();
                        document.execCommand("Copy");
                        textArea.remove();
                        alert("已複製網址!");
                    }
                </script>
            </div>

            <div style="display: flex; flex-wrap: wrap; align-items: flex-start; gap: 40px; margin-top: 40px; margin-bottom: 20px;">
                <div style="flex: 2; min-width: 300px;">
                    <p style="font-size: 18px; font-weight: bold; margin-bottom: 10px; color: #333;">接線圖</p>
                    <div style="position: relative;">
                        <img src="diagram/小飛鼠接線圖.PNG" alt="小飛鼠接線圖" style="width: 100%; height: auto; display: block; cursor: pointer;" onclick="openModal('diagram/小飛鼠接線圖.PNG')" title="點擊放大">
                    </div>
                </div>
                
                <div class="materials-info" style="flex: 1; min-width: 250px; margin-top: 0;">
                    <h2 class="section-subtitle" style="margin-bottom: 15px;">小飛鼠材料</h2>
                    <ol style="line-height: 1.8; font-size: 16px; padding-left: 24px; color: #333;">
                        <li>Micro:bit V2 1片</li>
                        <li>充電電池模組 KS B040 1個</li>
                        <li>迴紋針 1個</li>
                        <li>R型端子 1個</li>
                        <li>母對公杜邦線 1條</li>
                    </ol>
                    <p class="material-line link-line" style="margin-top: 20px;">
                        組裝方法 : <a href="https://www.youtube.com/watch?v=e2RCiFNIF9g" class="text-link" target="_blank">KS B040充電電池模組</a>
                    </p>
                </div>
            </div>
        </section>

        <div class="footer-action">
            <a href="index.html" class="primary-btn home-btn">HOME</a>
        </div>

    </main>

    <!-- Image Modal -->
    <div id="imageModal" class="modal" onclick="closeModal()">
        <span class="modal-close" onclick="closeModal()">&times;</span>
        <img class="modal-content" id="modalImage">
    </div>

    <script>
        function openModal(imageSrc) {
            document.getElementById('imageModal').style.display = "block";
            document.getElementById('modalImage').src = imageSrc;
        }
        
        function closeModal() {
            document.getElementById('imageModal').style.display = "none";
        }
    </script>
</body>

</html>
