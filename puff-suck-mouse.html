<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>藍牙吹吸滑鼠 - DIY智能家居改造及電腦、手機、平板操作輔具</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
</head>

<body>

    <header class="top-bar">
        <div class="container">
            <span><a href="index.html" style="color: white; text-decoration: none;">DIY智能家居改造及電腦、手機、平板操作輔具 micro:bit
                    應用</a></span>
        </div>
    </header>

    <main class="content-container">
        <h1 class="main-title big-blue-title">藍牙吹吸滑鼠</h1>

        <section class="content-section">
            <h2 class="section-subtitle">說明影片</h2>

            <div class="video-responsive-wrapper">
                <iframe width="640" height="360" src="https://www.youtube.com/embed/rii91CdiCyE" title="藍牙吹吸滑鼠說明影片"
                    frameborder="0"
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                    allowfullscreen></iframe>
            </div>

            <div class="info-links">
                <p class="info-text-label">說明文件 : <a href="docs/藍牙吹吸滑鼠操作說明.pdf" class="text-link"
                        target="_blank">藍牙吹吸滑鼠操作說明</a></p>
            </div>

            <!-- Code Download Section -->
            <div class="code-download-box">
                <p class="box-header"><span class="icon">📄</span> Microbit程式下載網址</p>
                <div class="code-row">
                    <div class="code-block-green" id="code-url">
                        https://github.com/wen033codes/BT-Puff-Suck-Mouse-Buttons.git
                    </div>
                    <button class="copy-btn" onclick="copyCode()">複製</button>
                </div>
                <!-- <p class="copy-instruction"><span class="icon">📋</span> 複製方法：三次點擊上方代碼區域選取全部，然後 Ctrl+C</p> -->

                <script>
                    function copyCode() {
                        var copyText = document.getElementById("code-url");
                        var textArea = document.createElement("textarea");
                        textArea.value = copyText.textContent.trim();
                        document.body.appendChild(textArea);
                        textArea.select();
                        document.execCommand("Copy");
                        textArea.remove();
                        alert("已複製網址!");
                    }
                </script>
            </div>

            <div class="materials-info">
                <div class="materials-row">
                    <div class="materials-col">
                        <p class="material-line" style="margin-bottom: 4px;">
                            <span class="blue-text">主要材料</span>
                            <span class="red-text">(價格僅供參考)</span> :
                        </p>
                        <ul class="item-list">
                            <li class="blue-text">micro:bit/520元</li>
                        </ul>
                    </div>
                    <div class="materials-col">
                        <p class="material-line blue-text">
                            其他材料 :
                        </p>
                    </div>
                </div>
            </div>
        </section>

        <div class="footer-action">
            <a href="index.html" class="primary-btn home-btn">HOME</a>
        </div>

    </main>

</body>

</html>
