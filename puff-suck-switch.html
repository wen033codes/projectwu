<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>藍牙吹吸按鍵(搭配iOS切換控制) - DIY智能家居改造及電腦、手機、平板操作輔具</title>
    <link rel="stylesheet" href="style.css?v=6">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
</head>

<body>

    <header class="top-bar">
        <div class="container">
            <span><a href="index.html" style="color: white; text-decoration: none;">DIY智能家居改造及電腦、手機、平板操作輔具 micro:bit
                    應用</a></span>
        </div>
    </header>

    <main class="content-container">
        <h1 class="main-title big-blue-title">藍牙吹吸按鍵(搭配iOS切換控制)</h1>

        <section class="content-section">
            <h2 class="section-subtitle">說明影片</h2>

            <div class="info-links">
                <p class="info-text-label">說明文件 :</p>
            </div>

            <p class="info-text-label">程式下載 :</p>

            <!-- Code Download Section -->
            <div class="code-download-box" style="margin-bottom: 30px;">
                <p class="box-header"><span class="icon">📄</span> Microbit程式下載網址</p>
                <div class="code-row">
                    <div class="code-block-green" id="code-url">
                        https://github.com/wen033codes/BT-Blow-In-SW.git
                    </div>
                    <button class="copy-btn" onclick="copyCode()">複製</button>
                </div>
                <script>
                    function copyCode() {
                        var copyText = document.getElementById("code-url");
                        var textArea = document.createElement("textarea");
                        textArea.value = copyText.textContent.trim();
                        document.body.appendChild(textArea);
                        textArea.select();
                        document.execCommand("Copy");
                        textArea.remove();
                        alert("已複製網址!");
                    }
                </script>
            </div>

            <div class="materials-info">
                <div class="materials-row">
                    <div class="materials-col">
                        <p class="material-line" style="margin-bottom: 4px;">
                            <span class="blue-text">主要材料</span>
                            <span class="red-text">(價格僅供參考)</span> :
                        </p>
                        <ul class="item-list">
                            <li class="blue-text">micro:bit/520元</li>
                        </ul>
                    </div>
                    <div class="materials-col">
                        <p class="material-line blue-text">
                            其他材料 :
                        </p>
                    </div>
                </div>
            </div>
        </section>

        <div class="footer-action">
            <a href="index.html" class="primary-btn home-btn">HOME</a>
        </div>

    </main>

<script src="sidebar.js?v=8"></script>
</body>

</html>
