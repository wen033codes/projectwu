<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小白鴿聲控叫人鈴 - DIY智能家居改造及電腦、手機、平板操作輔具</title>
    <link rel="stylesheet" href="style.css?v=2.0">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        /* Image Modal Styles */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.8);
        }
        .modal-content {
            margin: auto;
            display: block;
            max-width: 90%;
            max-height: 90%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            object-fit: contain;
        }
        .modal-close {
            position: absolute;
            top: 15px;
            right: 35px;
            color: #f1f1f1;
            font-size: 40px;
            font-weight: bold;
            transition: 0.3s;
            cursor: pointer;
            z-index: 1001;
        }
        .modal-close:hover,
        .modal-close:focus {
            color: #bbb;
            text-decoration: none;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <header class="top-bar">
        <div class="container">
            <span><a href="index.html" style="color: white; text-decoration: none;">DIY智能家居改造及電腦、手機、平板操作輔具 micro:bit
                    應用</a></span>
        </div>
    </header>

    <main class="content-container">
        <h1 class="main-title big-blue-title">小白鴿聲控叫人鈴</h1>

        <section class="content-section">
            <h2 class="section-subtitle">說明影片</h2>

            <div class="video-responsive-wrapper">
                <!-- Placeholder for YouTube embed -->
                <iframe width="640" height="360" src="https://www.youtube.com/embed/y7j5L2fANhc" title="小白鴿使用說明"
                    frameborder="0"
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                    referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
            </div>

            <div class="info-links">
                <p class="info-text">說明文件</p>
                <p class="info-text">程式下載</p>
                
                <div style="display: flex; flex-wrap: wrap; align-items: flex-start; gap: 40px; margin-top: 20px; margin-bottom: 20px;">
                    <div style="flex: 2; min-width: 300px;">
                        <div style="position: relative;">
                            <img src="diagram/小白鴿接線圖.PNG" alt="小白鴿接線圖" style="width: 100%; height: auto; display: block; cursor: pointer;" onclick="openModal('diagram/小白鴿接線圖.PNG')" title="點擊放大">
                        </div>
                    </div>
                    
                    <div class="materials-info" style="flex: 1; min-width: 250px; margin-top: 0;">
                        <h2 class="section-subtitle" style="margin-bottom: 15px;">小白鴿材料</h2>
                        <ol style="line-height: 1.8; font-size: 16px; padding-left: 24px; color: #333;">
                            <li>1路5V繼電器模組 1個</li>
                            <li>CI-03T(含喇叭、麥克風) 1個</li>
                            <li>3.5mm 兩芯單聲道音源線(公頭) 1個</li>
                            <li>2.0mm(母) 轉2.54mm(公)杜邦線 3條</li>
                            <li>5V/1A充電頭 1個</li>
                            <li>USB電源線 1條</li>
                        </ol>
                    </div>
                </div>
            </div>
        </section>

        <div class="footer-action">
            <a href="index.html" class="primary-btn home-btn">HOME</a>
        </div>

    </main>

    <!-- Image Modal -->
    <div id="imageModal" class="modal" onclick="closeModal()">
        <span class="modal-close" onclick="closeModal()">&times;</span>
        <img class="modal-content" id="modalImage">
    </div>

    <script>
        function openModal(imageSrc) {
            document.getElementById('imageModal').style.display = "block";
            document.getElementById('modalImage').src = imageSrc;
        }
        
        function closeModal() {
            document.getElementById('imageModal').style.display = "none";
        }
    </script>
</body>

</html>
